<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="Crazy Sidd's Music Player"
    >

    <title>Crazy Sidd's Music Player</title>

    <!-- Google Fonts -->
    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- Main Stylesheet -->
    <link
        rel="stylesheet"
        href="styles.css"
    >
</head>

<body>

    <!-- Loading Screen -->
    <div
        class="loading-screen"
        id="loadingScreen"
        role="status"
        aria-label="Loading Crazy Sidd's Music Player"
    >
        <div class="loading-mark">
            <i
                data-lucide="audio-waveform"
                aria-hidden="true"
            ></i>
        </div>

        <h1>Crazy Sidd's</h1>
        <p>Music Player</p>

        <span class="loading-line"></span>
    </div>

    <!-- Ambient Background -->
    <div class="ambient a1"></div>
    <div class="ambient a2"></div>

    <!-- Main Application -->
    <div class="app">

        <!-- Header -->
        <header class="topbar">

            <button
                class="icon mobile"
                id="menu"
                aria-label="Open menu"
                title="Open menu"
            >
                <i data-lucide="menu"></i>
            </button>

            <button
                class="brand"
                data-route="home"
            >
                Crazy Sidd's
                <span>Music Player</span>
            </button>

            <nav class="topnav">
                <button
                    data-route="home"
                    class="active"
                >
                    <i data-lucide="house"></i>
                    Home
                </button>

                <button data-route="browse">
                    <i data-lucide="compass"></i>
                    Browse
                </button>

                <button data-route="radio">
                    <i data-lucide="radio"></i>
                    Radio
                </button>
            </nav>

            <label class="search">
                <i data-lucide="search"></i>

                <input
                    id="search"
                    placeholder="Search"
                    autocomplete="off"
                >

                <kbd>⌘ K</kbd>
            </label>

            <button
                class="avatar"
                title="Profile"
            >
                CS
            </button>

        </header>

        <!-- Sidebar -->
        <aside
            class="sidebar"
            id="sidebar"
        >
            <!-- Sidebar Content -->
        </aside>

        <!-- Main Content -->
        <main
            id="main"
            tabindex="-1"
        ></main>

        <!-- Footer -->
        <footer class="site-footer">
            <span>Designed &amp; created by</span>
            <strong>Siddhartha Kotnaka</strong>

            <i
                data-lucide="music-2"
                aria-hidden="true"
            ></i>
        </footer>

    </div>

</body>
</html>
